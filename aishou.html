<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'none'; form-action 'none'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'">
<title>ラブチャット16 相性診断 ｜ 2キャラの相性</title>
<meta name="description" content="ラブチャット16の2タイプの相性を診断。気になる相手や友達のキャラと、会話の相性がわかる。">
<!-- OGP ※公開時は絶対URLに置換 -->
<meta property="og:type" content="website">
<meta property="og:title" content="ラブチャット16 相性診断 ｜ あなたと相手の相性は？">
<meta property="og:description" content="16キャラの会話相性を診断。気になる相手・友達のキャラとどのくらい合う？">
<meta property="og:image" content="assets/ogp.jpg">
<meta property="og:image:width" content="1200"><meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ラブチャット16 相性診断 ｜ あなたと相手の相性は？">
<meta name="twitter:description" content="16キャラの会話相性を診断。気になる相手・友達のキャラとどのくらい合う？ #ラブチャット16">
<meta name="twitter:image" content="assets/ogp.jpg">
<link rel="stylesheet" href="assets/lc16-result.css">
<style>
  :root{--bg1:#1a1130;--bg2:#2b1645;--card:#2a1c44;--card2:#34245a;--accent:#ff5d8f;--accent2:#a06bff;--text:#f4eeff;--muted:#b6a8d6;--line:#473163;--ok:#5de0a8;--warn:#ffb86b}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--text);min-height:100vh;line-height:1.7;-webkit-font-smoothing:antialiased}
  .wrap{max-width:560px;margin:0 auto;padding:24px 18px 64px}
  .screen{display:none;animation:fade .35s ease}.screen.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
  .nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;font-size:13px}
  .nav a{color:var(--muted);text-decoration:none}
  .badge{display:inline-block;font-size:12px;letter-spacing:.1em;color:var(--accent2);border:1px solid var(--line);border-radius:999px;padding:5px 12px}
  h1{font-size:26px;line-height:1.3;margin:14px 0 12px;font-weight:800}
  h1 .hl{background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .lead{color:var(--muted);font-size:14px;margin:0 0 22px}
  .pickrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .pick{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;text-align:center}
  .pick .mini{width:96px;height:auto;margin:0 auto 8px}
  .pick .mini img,.pick .mini .cv img{border-radius:16px}
  .pick select{width:100%;background:var(--bg2);color:var(--text);border:1.5px solid var(--line);border-radius:10px;padding:9px;font-size:14px;font-family:inherit}
  .pick label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:8px}
  .vs{font-size:20px;font-weight:800;color:var(--accent)}
  .btn{display:block;width:100%;border:0;cursor:pointer;font-weight:800;font-size:17px;color:#fff;background:linear-gradient(120deg,var(--accent),var(--accent2));padding:16px;border-radius:14px;box-shadow:0 8px 24px rgba(255,93,143,.28);margin-top:8px}
  .btn:active{transform:scale(.99)}.btn.sub{background:transparent;border:1px solid var(--line);color:var(--text);box-shadow:none;font-size:15px;font-weight:700}
  .note{font-size:12px;color:var(--muted);margin-top:16px;text-align:center;line-height:1.6}
  /* result */
  .hero{background:linear-gradient(165deg,var(--card2),var(--card));border:1px solid var(--line);border-radius:22px;padding:24px 16px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;background:radial-gradient(140px 140px at 50% 0,rgba(255,93,143,.22),transparent)}
  .hero>*{position:relative}
  .pair{display:flex;align-items:center;justify-content:center;gap:8px}
  .pair .col{flex:1;min-width:0}
  .pair .mini{width:110px;margin:0 auto;animation:pop .5s ease}
  .pair .mini img,.pair .mini .cv img{border-radius:18px}
  .pair .pname{font-size:14px;font-weight:800;margin-top:6px}
  .pair .ptype{font-size:11px;color:var(--muted)}
  .pair .heart{font-size:34px;flex:0 0 auto}
  .score{font-size:58px;font-weight:800;margin:14px 0 2px}
  .verdict{font-size:22px;font-weight:800;color:#ffd36b;margin-bottom:6px}
  .gtrack{height:14px;border-radius:999px;background:linear-gradient(90deg,#6fa8e0,#a06bff,#ff9a76,#ff5d8f);position:relative;margin:14px 6px 0}
  .gtrack .gmark{position:absolute;top:-4px;width:6px;height:22px;border-radius:3px;background:#fff;box-shadow:0 0 8px rgba(0,0,0,.5);transform:translateX(-3px)}
  .sec{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
  .sec h3{margin:0 0 8px;font-size:13px;letter-spacing:.04em}
  .sec.good h3{color:var(--ok)} .sec.bad h3{color:var(--warn)}
  .sec ul{margin:0;padding-left:18px}.sec li{font-size:14px;margin-bottom:5px}
  .cta{margin-top:20px}.cta .btn{margin-bottom:12px}
  .disc{font-size:11px;color:var(--muted);margin-top:18px;line-height:1.6;border-top:1px solid var(--line);padding-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <!-- PICK -->
  <section id="pick" class="screen active">
    <div class="nav"><span class="badge">LOVECHAT 16 ｜ 相性診断</span><a href="index.html">自分の診断 →</a></div>
    <h1>2人の<span class="hl">会話キャラ相性</span>診断</h1>
    <p class="lead">2人の会話キャラで相性を診断。</p>
    <div class="pickrow">
      <div class="pick"><label>あなた</label><div class="mini" id="miniA"></div><select id="selA" onchange="onPick()"></select></div>
      <span class="vs">×</span>
      <div class="pick"><label>相手</label><div class="mini" id="miniB"></div><select id="selB" onchange="onPick()"></select></div>
    </div>
    <button class="btn" onclick="diagnose()">相性を見る →</button>
    <p class="note">キャラが分からない人は、まず<a href="index.html" style="color:var(--accent2)">自分の診断</a>と<a href="partner.html" style="color:var(--accent2)">相手診断</a>から。</p>
  </section>

  <!-- RESULT -->
  <section id="result" class="screen"></section>
</div>

<script src="chars.js"></script>
<script>
const CODES = Object.keys(NAMES);
function fillSelect(sel, selected){
  sel.innerHTML = CODES.map(c=>`<option value="${c}" ${c===selected?'selected':''}>${NAMES[c]}｜${CHAR[c].name}</option>`).join('');
}
function onPick(){
  const a=document.getElementById('selA').value, b=document.getElementById('selB').value;
  document.getElementById('miniA').innerHTML=charVisual(a,96);
  document.getElementById('miniB').innerHTML=charVisual(b,96);
  upgradeCharVisuals(document.getElementById('pick'));
}
let LAST=null;
function diagnose(){
  const a=document.getElementById('selA').value, b=document.getElementById('selB').value;
  const info=compatInfo(a,b); LAST={a,b,info};
  const shareText=`【${CHAR[a].name}】×【${CHAR[b].name}】の会話相性は ${info.score}%「${info.label}」${info.emoji}\nあなたの相性は？診断▶ #ラブチャット16`;
  document.getElementById('result').innerHTML=`
    <div class="nav"><a href="#" onclick="show('pick');return false;">← 選び直す</a><a href="index.html">自分の診断 →</a></div>
    <div class="hero">
      <div class="pair">
        <div class="col"><div class="mini">${charVisual(a,110)}</div><div class="pname">${CHAR[a].name}</div><div class="ptype">${NAMES[a]}</div></div>
        <div class="heart">${info.emoji}</div>
        <div class="col"><div class="mini">${charVisual(b,110)}</div><div class="pname">${CHAR[b].name}</div><div class="ptype">${NAMES[b]}</div></div>
      </div>
      <div class="score">${info.score}<span style="font-size:24px;color:var(--muted)">%</span></div>
      <div class="verdict">${info.emoji} ${info.label}</div>
      <div class="gtrack"><div class="gmark" style="left:${info.score}%"></div></div>
    </div>
    ${info.goods.length?`<div class="sec good"><h3>◎ 噛み合う点</h3><ul>${info.goods.map(g=>`<li>${g}</li>`).join('')}</ul></div>`:''}
    ${info.cautions.length?`<div class="sec bad"><h3>△ すれ違いやすい点</h3><ul>${info.cautions.map(g=>`<li>${g}</li>`).join('')}</ul></div>`:''}
    <div class="cta">
      <button class="btn" onclick="shareCompat()">📸 相性カードを保存してシェア</button>
      <button class="btn sub" onclick="show('pick')">別の組み合わせで診断</button>
      <button class="btn sub" onclick="location.href='partner.html'">相手の返信タイプを詳しく読む →</button>
      <button class="btn sub" onclick="location.href='index.html'">自分のメッセージタイプを診断する →</button>
    </div>
    <p class="disc">※本診断はキャラ（会話傾向）どうしの相性を整理するもので、相手やあなたの人格・恋愛の成否を断定するものではありません。すれ違いを減らすための目安としてお使いください。</p>
  `;
  show('result');
  upgradeCharVisuals(document.getElementById('result'));
}
function shareCompat(){ if(!LAST) return;
  const {a,b,info}=LAST;
  const txt=`【${CHAR[a].name}】×【${CHAR[b].name}】の会話相性は ${info.score}%「${info.label}」${info.emoji}\nあなたの相性は？無料診断▶ #ラブチャット16`;
  shareCompatImage(a,b,info,txt);
}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

/* 初期化（相性◎の組み合わせをデフォルトに） */
fillSelect(document.getElementById('selA'),'AFED');
fillSelect(document.getElementById('selB'),'RFCD');
onPick();
</script>
</body>
</html>
